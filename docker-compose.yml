services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - VECTOR_DB_DIR=/app/data/vector_store
      - DATA_DIR=/app/data/reports
      - REPORTS_DIR=/app/data/reports
      - DOCUMENTS_DB_PATH=/app/data/documents.db
      - RECOMMENDATIONS_DB_PATH=/app/data/recommendations.db
      - IMAGES_DIR=/app/data/images
      - RECOMMENDATIONS_PATH=/app/data/recommendations.json
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend_data:
