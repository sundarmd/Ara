# Local development/demo Compose file.
# Services bind-mount source directories so container behavior follows the working tree.
# Do not treat this file as a production-like immutable image deployment.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - VECTOR_DB_DIR=/app/data/vector_store
      - DATA_DIR=/app/data/reports
      - REPORTS_DIR=/app/data/reports
      - DOCUMENTS_DB_PATH=/app/data/documents.db
      - RECOMMENDATIONS_DB_PATH=/app/data/recommendations.db
      - IMAGES_DIR=/app/data/images
      - RECOMMENDATIONS_PATH=/app/data/recommendations.json
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend_data:
