name: Quality Gates

on:
  pull_request:
    branches:
      - main
      - beta
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONUNBUFFERED: "1"
      MISTRAL_API_KEY: ci-placeholder
      TAVILY_API_KEY: ci-placeholder
      REQUIRE_API_KEY: "false"
      AUTO_SEED_MOCK_DATA: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

  frontend-checks:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  eval-dry-run:
    name: Eval file validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate golden eval cases
        run: python evals/run_eval.py --dry-run

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create non-secret Compose env file
        run: |
          {
            echo "MISTRAL_API_KEY=ci-placeholder"
            echo "TAVILY_API_KEY=ci-placeholder"
            echo "REQUIRE_API_KEY=false"
            echo "API_KEY="
            echo "API_KEY_HEADER_NAME=X-API-Key"
          } > .env

      - name: Validate Compose configuration
        run: docker compose config --quiet
